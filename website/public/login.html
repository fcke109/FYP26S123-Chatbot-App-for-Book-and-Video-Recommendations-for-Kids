<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Little Dino</title>

  <link rel="icon" type="image/png" href="/images/little_dino_icon_512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .auth-section { padding: 5rem 0; min-height: calc(100vh - 180px); display: flex; align-items: center; }
    .auth-card { max-width: 460px; margin: 0 auto; padding: 2.4rem; border-radius: var(--radius-xl); border: 1px solid rgba(102, 187, 106, 0.15); box-shadow: 0 18px 45px rgba(76, 175, 80, 0.1); background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); }
    .auth-card h2 { font-family: 'Baloo 2', sans-serif; text-align: center; margin: 0.5rem 0; color: #2E7D32; }
    .auth-card .subtitle { text-align: center; color: var(--muted); margin-bottom: 1.5rem; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 999px; overflow: hidden; border: 2px solid #66BB6A; }
    .auth-tab { flex: 1; padding: 0.7rem; text-align: center; font-weight: 700; cursor: pointer; background: rgba(102, 187, 106, 0.08); color: #4CAF50; border: none; font-family: inherit; font-size: 0.95rem; transition: all 0.2s; }
    .auth-tab.active { background: linear-gradient(135deg, #66BB6A, #4CAF50); color: white; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 0.4rem; color: #2d2542; }
    .form-group input, .form-group select { width: 100%; padding: 0.75rem 1rem; border: 2px solid rgba(102, 187, 106, 0.2); border-radius: 14px; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: rgba(255,255,255,0.9); }
    .form-group input:focus, .form-group select:focus { border-color: #66BB6A; box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.15); }
    .btn-form { width: 100%; padding: 0.85rem; border: none; border-radius: 999px; background: linear-gradient(135deg, #FF7043, #F4511E); color: white; font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; box-shadow: 0 12px 28px rgba(255, 112, 67, 0.3); transition: 0.22s ease; margin-top: 0.5rem; }
    .btn-form:hover { transform: translateY(-2px); box-shadow: 0 16px 35px rgba(255, 112, 67, 0.4); }
    .auth-message { padding: 0.8rem; border-radius: 14px; margin-bottom: 1rem; font-weight: 600; font-size: 0.9rem; display: none; }
    .auth-message.error { background: #ffebee; color: #c62828; display: block; }
    .auth-message.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .auth-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--muted); }
    .auth-link a { color: #4CAF50; font-weight: 700; }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="bg-grid"></div>

  <header class="site-header">
    <div class="container nav">
      <a href="/" class="brand">
        <img src="/images/little_dino_icon_512.png" alt="Little Dino logo" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-title">Little Dino</span>
          <span class="brand-subtitle">Safe Kids Book & Video Discovery</span>
        </div>
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>

      <nav class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/catalog.html">Book Catalog</a>
        <a href="/login.html" class="nav-cta">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="auth-section">
      <div class="container">
        <div class="auth-card glass-card">
          <img src="/images/little_dino_icon_512.png" alt="Little Dino" style="width:64px;border-radius:18px;display:block;margin:0 auto 0.8rem;" />
          <h2>Welcome!</h2>
          <p class="subtitle">Sign in to browse the book catalog</p>

          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="register">Register</button>
          </div>

          <div id="auth-message" class="auth-message"></div>

          <form id="login-form">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn-form">Sign In</button>
            <p class="auth-link"><a href="#" id="forgot-password-link">Forgot password?</a></p>
          </form>

          <form id="register-form" style="display:none;">
            <div class="form-group">
              <label for="reg-name">Name</label>
              <input type="text" id="reg-name" required placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="reg-age">Age</label>
              <input type="number" id="reg-age" required min="3" max="99" placeholder="Age">
            </div>
            <div class="form-group">
              <label for="reg-type">Account Type</label>
              <select id="reg-type">
                <option value="CHILD">Child</option>
                <option value="PARENT">Parent / Guardian</option>
              </select>
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
              <label for="reg-confirm">Confirm Password</label>
              <input type="password" id="reg-confirm" required placeholder="Confirm password">
            </div>
            <button type="submit" class="btn-form">Create Account</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-brand">
        <img src="/images/little_dino_icon_512.png" alt="Little Dino footer logo" class="footer-logo" />
        <div>
          <strong>Little Dino</strong>
          <p>Chatbot App for Book and Video Recommendations for Kids</p>
        </div>
      </div>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/privacy.html">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <script src="/js/script.js"></script>
  <script type="module">
    import {
      auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      sendPasswordResetEmail, onAuthStateChanged, doc, setDoc, serverTimestamp
    } from '/js/firebase-config.js';

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const msgEl = document.getElementById('auth-message');
    const tabs = document.querySelectorAll('.auth-tab');

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = '/catalog.html';
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        msgEl.className = 'auth-message';
        loginForm.style.display = tab.dataset.tab === 'login' ? 'block' : 'none';
        registerForm.style.display = tab.dataset.tab === 'register' ? 'block' : 'none';
      });
    });

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'auth-message ' + type;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
        showMsg('Signed in! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/catalog.html', 1000);
      } catch (err) { showMsg(err.message.replace('Firebase: ', ''), 'error'); }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('reg-password').value;
      if (pw !== document.getElementById('reg-confirm').value) { showMsg('Passwords do not match.', 'error'); return; }
      try {
        const cred = await createUserWithEmailAndPassword(auth, document.getElementById('reg-email').value, pw);
        await setDoc(doc(db, 'users', cred.user.uid), {
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          age: parseInt(document.getElementById('reg-age').value),
          accountType: document.getElementById('reg-type').value,
          planType: 'FREE', interests: [], readingLevel: 'Beginner',
          childIds: [], parentId: null, isGuest: false, createdAt: serverTimestamp()
        });
        showMsg('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/catalog.html', 1000);
      } catch (err) { showMsg(err.message.replace('Firebase: ', ''), 'error'); }
    });

    document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      if (!email) { showMsg('Enter your email first.', 'error'); return; }
      try { await sendPasswordResetEmail(auth, email); showMsg('Reset email sent!', 'success'); }
      catch (err) { showMsg(err.message.replace('Firebase: ', ''), 'error'); }
    });
  </script>
</body>
</html>
